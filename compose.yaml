version: "3.9"

services:

  db:
    image: postgres:16.3-alpine
    restart: always
    shm_size: 128mb
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/001_tables.sql:/docker-entrypoint-initdb.d/001_tables.sql:ro
      - ./migrations/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
      - ./migrations/003_procedures.sql:/docker-entrypoint-initdb.d/003_procedures.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
